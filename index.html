<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFX Editor Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --text: #fafafa;
            --accent: #d4af37;
            --card-bg: #141414;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            height: auto;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 3rem;
            z-index: 100;
        }

        .nav-left {
            display: flex;
            gap: 2rem;
        }

        .nav-btn {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid rgba(250, 250, 250, 0.2);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .nav-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
        }

        .nav-btn.primary:hover {
            background: transparent;
            color: var(--accent);
        }

        body, html {
            height: 100%;
        }

        .nav-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 0.1em;
            color: var(--text);
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 1rem;
            }
        }

        .logo span {
            color: var(--accent);
        }

        .nav-right {
            display: flex;
            gap: 1.5rem;
        }

        .social-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(250, 250, 250, 0.2);
            border-radius: 50%;
            color: var(--text);
            text-decoration: none;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .social-icon:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }

        /* Hamburger Menu */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 0.5rem;
            z-index: 101;
        }

        .hamburger span {
            width: 24px;
            height: 2px;
            background: var(--text);
            transition: all 0.3s ease;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* WhatsApp Button */
        .whatsapp-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            z-index: 99;
        }

        .whatsapp-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(37, 211, 102, 0.5);
        }

        .whatsapp-btn svg {
            width: 32px;
            height: 32px;
        }

        /* Scroll Wrapper - creates scrollable area */
        .scroll-wrapper {
            height: 100vh;
            position: relative;
        }

        /* Hero Section - Fixed */
        .hero {
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            width: 100%;
            height: calc(100vh - 70px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            z-index: 1;
        }

        .hero-content {
            position: relative;
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .hero-container {
            position: relative;
            width: 100%;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            object-fit: contain;
        }

        .hero-border {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            aspect-ratio: 16/9;
            max-height: 100%;
            border: 1px solid rgba(212, 175, 55, 0.15);
            pointer-events: none;
            box-sizing: border-box;
        }

        .hero-border::before,
        .hero-border::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border: 1px solid var(--accent);
            box-sizing: border-box;
        }

        .hero-border::before {
            top: -1px;
            left: -1px;
            border-right: none;
            border-bottom: none;
        }

        .hero-border::after {
            bottom: -1px;
            right: -1px;
            border-left: none;
            border-top: none;
        }

        .hero-info {
            text-align: center;
            margin-top: 1rem;
            position: relative;
            z-index: 51;
        }

        .hero-info .hero-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2rem, 5vw, 4rem);
            letter-spacing: 0.05em;
            line-height: 1;
            text-transform: uppercase;
        }

        .hero-title span {
            color: var(--accent);
        }

        .hero-subtitle {
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-top: 0.5rem;
            opacity: 0.6;
        }

        /* Projects Section */
        .projects {
            position: relative;
            padding: 4rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
            background: var(--bg);
            z-index: 2;
        }

        .projects::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
            z-index: 0;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .section-header h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-weight: 400;
        }

        .section-header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(250, 250, 250, 0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }

        .card {
            cursor: pointer;
            background: transparent;
        }

        .card-info {
            padding: 1rem 0;
            background: transparent;
        }

        .card-media {
            position: relative;
            aspect-ratio: 16/10;
            background: var(--card-bg);
            overflow: hidden;
            min-height: 150px;
        }

        .card-media::before {
            content: '';
            position: absolute;
            inset: 0;
            background: #2a5a3a;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 1;
        }

        .card-media video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            pointer-events: none;
        }

        .card-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            color: #fafafa;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .card:hover .card-play {
            opacity: 1;
        }

        .card:hover .card-media img {
            transform: scale(1.05);
        }

        .card-overlay-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 0.15em;
            color: #fafafa;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .card:hover .card-media::before {
            opacity: 0.85;
        }

        .card:hover .card-media video {
            transform: scale(1.05);
        }

        .card:hover .card-overlay-title {
            opacity: 1;
            transform: translateY(0);
        }

        .card-info {
            padding: 1rem 0;
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
            color: var(--text);
        }

        .card-artist {
            font-size: 0.7rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(250, 250, 250, 0.4);
        }

        .card-vfx {
            font-size: 0.65rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #f7d774;
            margin-top: 0.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }

        /* Footer */
        footer {
            padding: 4rem;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .footer-links a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .footer-links a:hover {
            opacity: 1;
            color: var(--accent);
        }

        .copyright {
            font-size: 0.7rem;
            opacity: 0.3;
            letter-spacing: 0.1em;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 1000px;
            aspect-ratio: 16/9;
        }

        .modal-close {
            position: absolute;
            top: -40px;
            right: 0;
            background: none;
            border: none;
            color: #fafafa;
            font-size: 2rem;
            cursor: pointer;
            padding: 0.5rem;
            line-height: 1;
        }

        .modal-close:hover {
            color: var(--accent);
        }

        .modal-video {
            width: 100%;
            height: 100%;
        }

        .modal-video iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Mobile Menu */
        .mobile-menu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 10, 0.98);
            z-index: 99;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
        }

        .mobile-menu.active {
            display: flex;
        }

        .mobile-menu a {
            font-size: 1.5rem;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 0.2em;
            color: var(--text);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .mobile-menu a:hover {
            color: var(--accent);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            nav {
                padding: 0 1.5rem;
            }

            .nav-left {
                display: none;
            }

            .hamburger {
                display: flex;
            }

            .hero {
                top: 60px;
                height: calc(100vh - 60px);
                padding: 0.5rem;
            }

            .hero-content {
                max-width: 100%;
            }

            .hero-info {
                padding: 0 0.5rem;
            }

            .hero-info .hero-subtitle {
                font-size: 0.6rem;
                letter-spacing: 0.1em;
            }

            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.25rem;
            }

            .card-info {
                padding: 0.5rem 0;
            }

            .card-title {
                font-size: 0.7rem;
            }

            .card-artist {
                font-size: 0.6rem;
            }

            .card-vfx {
                font-size: 0.55rem;
                margin-top: 0.25rem;
            }

            .nav-right {
                display: none;
            }

            .section-header {
                padding: 0 0.5rem;
            }

            footer {
                padding: 2rem;
            }

            .whatsapp-btn {
                bottom: 1rem;
                right: 1rem;
                width: 50px;
                height: 50px;
            }
        }

        @media (max-width: 480px) {
            .hero {
                top: 55px;
                height: calc(100vh - 55px);
            }

            .hero-info {
                margin-top: 0.5rem;
            }

            .section-header {
                margin-bottom: 1rem;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .whatsapp-btn {
                bottom: 0.75rem;
                right: 0.75rem;
                width: 45px;
                height: 45px;
            }
        }
    </style>
</head>
